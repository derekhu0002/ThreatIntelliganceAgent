services:
  opencode:
    image: ghcr.io/anomalyco/opencode
    ports:
      - "8124:4096"
    entrypoint: ["/usr/local/bin/opencode"]
    command: ["serve", "--port", "4096", "--hostname", "0.0.0.0", "--print-logs", "--log-level", "DEBUG"]
    working_dir: /root/project_tia
    env_file:
      - ../.env
    volumes:
      - ./opencode_app:/root/project_tia
    stdin_open: true
    tty: true