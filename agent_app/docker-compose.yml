services:
  opencode:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8124:4096"
    entrypoint: ["/usr/local/bin/opencode"]
    command: ["serve", "--port", "4096", "--hostname", "0.0.0.0", "--print-logs", "--log-level", "DEBUG"]
    working_dir: /root/project_tia
    env_file:
      - ../.env
    environment:
      PYTHON_BIN: python3
      PYTHONPATH: /root/project_tia
      THREAT_INTEL_REPO_ROOT: /root/project_tia
    volumes:
      - ./opencode_app:/root/project_tia
    stdin_open: true
    tty: true